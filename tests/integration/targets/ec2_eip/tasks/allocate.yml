---
- name: Test EIP allocation
  block:
    # ------------------------------------------------------------------------------------------
    # Allocate EIP with no condition
    # ------------------------------------------------------------------------------------------
    - name: Allocate a new EIP with no conditions - check_mode
      amazon.aws.ec2_eip:
        state: present
        tags: "{{ eip_test_tags }}"
      register: eip
      check_mode: true

    - ansible.builtin.assert:
        that:
          - eip is changed

    - name: Ensure no new EIP was created
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_no_new_eip: true

    - name: Allocate a new EIP with no conditions
      amazon.aws.ec2_eip:
        state: present
        tags: "{{ eip_test_tags }}"
      register: eip

    - ansible.builtin.assert:
        that:
          - eip is changed
          - "'ec2:CreateTags' not in eip.resource_actions"
          - "'ec2:DeleteTags' not in eip.resource_actions"
          - eip.public_ip is defined and eip.public_ip is ansible.utils.ipv4_address
          - eip.allocation_id is defined and eip.allocation_id.startswith("eipalloc-")

    - name: Ensure New EIP was created
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_new_eip: true

    - name: Get EIP info via public ip
      amazon.aws.ec2_eip_info:
        filters:
          public-ip: "{{ eip.public_ip }}"
      register: eip_info

    - ansible.builtin.assert:
        that:
          - '"addresses" in eip_info'
          - eip_info.addresses | length == 1
          - eip_info.addresses[0].allocation_id == eip.allocation_id
          - eip_info.addresses[0].domain == "vpc"
          - eip_info.addresses[0].public_ip == eip.public_ip
          - '"AnsibleEIPTestPrefix" in eip_info.addresses[0].tags'
          - eip_info.addresses[0].tags['AnsibleEIPTestPrefix'] == resource_prefix

    - name: Get EIP info via allocation id
      amazon.aws.ec2_eip_info:
        filters:
          allocation-id: "{{ eip.allocation_id }}"
      register: eip_info

    - ansible.builtin.assert:
        that:
          - '"addresses" in eip_info'
          - eip_info.addresses | length == 1
          - eip_info.addresses[0].allocation_id == eip.allocation_id
          - eip_info.addresses[0].domain == "vpc"
          - eip_info.addresses[0].public_ip == eip.public_ip
          - '"AnsibleEIPTestPrefix" in eip_info.addresses[0].tags'
          - eip_info.addresses[0].tags['AnsibleEIPTestPrefix'] == resource_prefix

    - name: Allocate a new ip (idempotence) - check_mode
      amazon.aws.ec2_eip:
        state: present
        public_ip: "{{ eip.public_ip }}"
      register: eip
      check_mode: true

    - ansible.builtin.assert:
        that:
          - eip is not changed

    - name: Ensure EIP was not created
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_no_new_eip: true

    - name: Allocate a new ip (idempotence)
      amazon.aws.ec2_eip:
        state: present
        public_ip: "{{ eip.public_ip }}"
      register: eip

    - ansible.builtin.assert:
        that:
          - eip is not changed
          - eip.public_ip is defined and eip.public_ip is ansible.utils.ipv4_address
          - eip.allocation_id is defined and eip.allocation_id.startswith("eipalloc-")

    - name: Ensure EIP was not created
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_no_new_eip: true

    # ------------------------------------------------------------------------------------------
    # Allocate EIP from a pool
    # ------------------------------------------------------------------------------------------
    - name: Allocate a new EIP from a pool - check_mode
      amazon.aws.ec2_eip:
        state: present
        public_ipv4_pool: amazon
        tags: "{{ eip_test_tags }}"
      register: eip_pool
      check_mode: true

    - ansible.builtin.assert:
        that:
          - eip_pool is changed

    - name: Ensure EIP was not created
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_no_new_eip: true

    - name: Allocate a new EIP from a pool
      amazon.aws.ec2_eip:
        state: present
        public_ipv4_pool: amazon
        tags: "{{ eip_test_tags }}"
      register: eip_pool

    - ansible.builtin.assert:
        that:
          - eip_pool is changed
          - eip_pool.public_ip is defined and eip_pool.public_ip is ansible.utils.ipv4_address
          - eip_pool.allocation_id is defined and eip_pool.allocation_id.startswith("eipalloc-")

    - name: Ensure new EIP was created
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_new_eip: true

    # ------------------------------------------------------------------------------------------
    # Allocate specific IP from pool using address parameter
    # ------------------------------------------------------------------------------------------
    - name: Save the IP address from the pool allocation
      ansible.builtin.set_fact:
        pool_ip_address: "{{ eip_pool.public_ip }}"

    - name: Release the pool EIP so we can reallocate it with address parameter
      amazon.aws.ec2_eip:
        state: absent
        public_ip: "{{ pool_ip_address }}"
      register: release_pool_eip

    - ansible.builtin.assert:
        that:
          - release_pool_eip is changed

    - name: Ensure EIP was released
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_released_eip: true

    - name: Allocate the same IP using address parameter - check_mode
      amazon.aws.ec2_eip:
        state: present
        public_ipv4_pool: amazon
        address: "{{ pool_ip_address }}"
        tags: "{{ eip_test_tags }}"
      register: eip_specific
      check_mode: true

    - ansible.builtin.assert:
        that:
          - eip_specific is changed

    - name: Ensure EIP was not created in check mode
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_no_new_eip: true

    - name: Allocate the same IP using address parameter
      amazon.aws.ec2_eip:
        state: present
        public_ipv4_pool: amazon
        address: "{{ pool_ip_address }}"
        tags: "{{ eip_test_tags }}"
      register: eip_specific

    - ansible.builtin.assert:
        that:
          - eip_specific is changed
          - eip_specific.public_ip == pool_ip_address
          - eip_specific.allocation_id is defined and eip_specific.allocation_id.startswith("eipalloc-")

    - name: Ensure new EIP was created with the requested address
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_new_eip: true

    - name: Allocate the same IP again (idempotence)
      amazon.aws.ec2_eip:
        state: present
        public_ip: "{{ pool_ip_address }}"
      register: eip_specific_idempotent

    - ansible.builtin.assert:
        that:
          - eip_specific_idempotent is not changed
          - eip_specific_idempotent.public_ip == pool_ip_address

    - name: Ensure no new EIP was created (idempotence)
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        has_no_new_eip: true

  always:
    - name: Delete EIP
      ansible.builtin.include_tasks: tasks/common.yml
      vars:
        delete_eips: true
